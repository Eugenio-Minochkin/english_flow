services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: english_flow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d english_flow"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/english_flow
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/english_flow
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ""
      TELEGRAM_WEBHOOK_URL: ""
      OPENAI_API_KEY: ""
      DEEPGRAM_API_KEY: ""
    command: sh -c "npx prisma migrate deploy && node dist/src/apps/worker/worker.js"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
